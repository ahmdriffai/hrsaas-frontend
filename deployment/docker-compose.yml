services:
  api:
    image: ghcr.io/ahmdriffai/hrsaas-backend:dev
    container_name: hrsaas-api
    restart: always
    command: sh -c "apk add --no-cache tzdata && ./main"
    ports:
      - 9000:9000
    volumes:
      - ./config:/app/config
    networks:
      - hrsaas-net
  panel:
    image: ghcr.io/ahmdriffai/hrsaas-frontend:development
    container_name: hrsaas-panel
    restart: always
    ports:
      - 5173:80
    networks:
      - hrsaas-net
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf

  cloudflared-api:
    image: cloudflare/cloudflared:latest
    container_name: hrsaas-api-tunnel
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token xxx
    networks:
      - hrsaas-net

  cloudflared-panel:
    image: cloudflare/cloudflared:latest
    container_name: hrsaas-panel-tunnel
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token xxx
    networks:
      - hrsaas-net

networks:
  hrsaas-net:
    name: hrsaas-net
    driver: bridge
